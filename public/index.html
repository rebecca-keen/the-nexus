<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07080c" />

    <!-- ═══════════════════════════════════════════
         PRIMARY SEO — Google reads this directly
    ════════════════════════════════════════════ -->
    <title>The Nexus — Suppressed History. Independent Research.</title>
    <meta name="description" content="The Nexus — Unresolved events, disputed records, and suppressed history. Independent research platform. All sources cited. No paywalls." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="The Nexus" />
    <meta name="keywords" content="suppressed history, alternative history, declassified documents, disputed records, independent research, unresolved events" />
    <link rel="canonical" href="https://nexusverse.app/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH — controls Instagram & TikTok
         link previews when you share your URL
    ════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Nexus" />
    <meta property="og:title" content="The Nexus — Suppressed History. Independent Research." />
    <meta property="og:description" content="Unresolved events, disputed records, and suppressed history. Independent research. All sources cited. No paywalls." />
    <meta property="og:url" content="https://nexusverse.app/" />
    <meta property="og:image" content="https://nexusverse.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Nexus — Suppressed History Research Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══════════════════════════════════════════
         TWITTER / X CARD — also used by TikTok
         for link preview cards
    ════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Nexus — Suppressed History. Independent Research." />
    <meta name="twitter:description" content="Unresolved events, disputed records, and suppressed history. All sources cited." />
    <meta name="twitter:image" content="https://nexusverse.app/og-image.jpg" />

    <!-- ═══════════════════════════════════════════
         GOOGLE ADSENSE
    ════════════════════════════════════════════ -->
